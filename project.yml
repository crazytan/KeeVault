name: KeeForge
options:
  bundleIdPrefix: com.keevault
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  minimumXcodeGenVersion: "2.38"
settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    SWIFT_STRICT_CONCURRENCY: complete
    DEVELOPMENT_TEAM: V82M9YX8BR
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
packages:
  Argon2Swift:
    url: https://github.com/tmthecoder/Argon2Swift.git
    branch: main
targets:
  KeeForge:
    type: application
    platform: iOS
    settings:
      base:
        INFOPLIST_FILE: KeeForge/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.keevault.app
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: KeeForge/KeeForge.entitlements
        PRODUCT_NAME: KeeForge
        PRODUCT_MODULE_NAME: KeeForge
        MARKETING_VERSION: "1.3.0"
        CURRENT_PROJECT_VERSION: "4"
        GENERATE_INFOPLIST_FILE: false
        SWIFT_EMIT_LOC_STRINGS: "YES"
    dependencies:
      - target: AutoFillExtension
        embed: true
        codeSign: true
      - package: Argon2Swift
    sources:
      - path: KeeForge/App
      - path: KeeForge/Models
      - path: KeeForge/Services
      - path: KeeForge/ViewModels
      - path: KeeForge/Views
      - path: KeeForge/Extensions
      - path: KeeForge/Resources

  AutoFillExtension:
    type: app-extension
    platform: iOS
    settings:
      base:
        INFOPLIST_FILE: AutoFillExtension/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.keevault.app.autofill
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: AutoFillExtension/AutoFillExtension.entitlements
        PRODUCT_NAME: KeeForgeAutoFill
        MARKETING_VERSION: "1.3.0"
        CURRENT_PROJECT_VERSION: "4"
        GENERATE_INFOPLIST_FILE: false
    dependencies:
      - package: Argon2Swift
    sources:
      - path: AutoFillExtension
      - path: KeeForge/Models
      - path: KeeForge/Services/BiometricService.swift
      - path: KeeForge/Services/DocumentPickerService.swift
      - path: KeeForge/Services/KeychainService.swift
      - path: KeeForge/Services/SettingsService.swift
      - path: KeeForge/Services/SharedVaultStore.swift
      - path: KeeForge/Services/CredentialMatcher.swift
      - path: KeeForge/Services/CredentialIdentityStoreManager.swift
      - path: KeeForge/Services/FaviconService.swift
      - path: KeeForge/Services/CoordinatedFileReader.swift
      - path: KeeForge/Services/KeyFileProcessor.swift
      - path: KeeForge/Services/PasskeyCrypto.swift

  KeeForgeUITests:
    type: bundle.ui-testing
    platform: iOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.keevault.app.uitests
        GENERATE_INFOPLIST_FILE: true
        TEST_TARGET_NAME: KeeForge
    dependencies:
      - target: KeeForge
    sources:
      - path: KeeForgeUITests
      - path: TestFixtures/test.kdbx
        buildPhase: resources
      - path: TestFixtures/demo.kdbx
        buildPhase: resources

  KeeForgeTests:
    type: bundle.unit-test
    platform: iOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.keevault.app.tests
        GENERATE_INFOPLIST_FILE: true
        TEST_TARGET_NAME: KeeForge
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/KeeForge.app/KeeForge"
    dependencies:
      - target: KeeForge
    sources:
      - path: KeeForgeTests
      - path: TestFixtures/test.kdbx
        buildPhase: resources
      - path: TestFixtures/demo.kdbx
        buildPhase: resources
      - path: TestFixtures/demo-keyfile.kdbx
        buildPhase: resources
      - path: TestFixtures/demo-keyfile.key
        buildPhase: resources
      - path: TestFixtures/test-binary.key
        buildPhase: resources
      - path: TestFixtures/test-hex.key
        buildPhase: resources
      - path: TestFixtures/test-v1.key
        buildPhase: resources
      - path: TestFixtures/test-v2.keyx
        buildPhase: resources
      - path: TestFixtures/test-arbitrary.key
        buildPhase: resources

schemes:
  KeeForge:
    build:
      targets:
        KeeForge: all
        KeeForgeUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      gatherCoverageData: false
      targets:
        - name: KeeForgeTests
          parallelizable: false
          randomExecutionOrder: false
        - name: KeeForgeUITests
          parallelizable: false
          randomExecutionOrder: false
