name: KeeVault
options:
  bundleIdPrefix: com.keevault
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  minimumXcodeGenVersion: "2.38"
settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    SWIFT_STRICT_CONCURRENCY: complete
    DEVELOPMENT_TEAM: V82M9YX8BR
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
packages:
  Argon2Swift:
    url: https://github.com/tmthecoder/Argon2Swift.git
    branch: main
targets:
  KeeVault:
    type: application
    platform: iOS
    settings:
      base:
        INFOPLIST_FILE: KeeVault/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.keevault.app
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: KeeVault/KeeVault.entitlements
        PRODUCT_NAME: KeeVault
        MARKETING_VERSION: "1.1.0"
        CURRENT_PROJECT_VERSION: "2"
        GENERATE_INFOPLIST_FILE: false
        SWIFT_EMIT_LOC_STRINGS: "YES"
    dependencies:
      - target: AutoFillExtension
        embed: true
        codeSign: true
      - package: Argon2Swift
    sources:
      - path: KeeVault/App
      - path: KeeVault/Models
      - path: KeeVault/Services
      - path: KeeVault/ViewModels
      - path: KeeVault/Views
      - path: KeeVault/Extensions
      - path: KeeVault/Resources

  AutoFillExtension:
    type: app-extension
    platform: iOS
    settings:
      base:
        INFOPLIST_FILE: AutoFillExtension/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.keevault.app.autofill
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: AutoFillExtension/AutoFillExtension.entitlements
        PRODUCT_NAME: KeeVaultAutoFill
        MARKETING_VERSION: "1.1.0"
        CURRENT_PROJECT_VERSION: "2"
        GENERATE_INFOPLIST_FILE: false
    dependencies:
      - package: Argon2Swift
    sources:
      - path: AutoFillExtension
      - path: KeeVault/Models
      - path: KeeVault/Services/BiometricService.swift
      - path: KeeVault/Services/DocumentPickerService.swift
      - path: KeeVault/Services/KeychainService.swift
      - path: KeeVault/Services/SharedVaultStore.swift
      - path: KeeVault/Services/CredentialMatcher.swift

  KeeVaultUITests:
    type: bundle.ui-testing
    platform: iOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.keevault.app.uitests
        GENERATE_INFOPLIST_FILE: true
        TEST_TARGET_NAME: KeeVault
    dependencies:
      - target: KeeVault
    sources:
      - path: KeeVaultUITests
      - path: TestFixtures/test.kdbx
        buildPhase: resources

  KeeVaultTests:
    type: bundle.unit-test
    platform: iOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.keevault.app.tests
        GENERATE_INFOPLIST_FILE: true
        TEST_TARGET_NAME: KeeVault
    dependencies:
      - target: KeeVault
    sources:
      - path: KeeVaultTests
      - path: TestFixtures/test.kdbx
        buildPhase: resources

schemes:
  KeeVault:
    build:
      targets:
        KeeVault: all
        KeeVaultUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      gatherCoverageData: false
      targets:
        - name: KeeVaultTests
          parallelizable: false
          randomExecutionOrder: false
        - name: KeeVaultUITests
          parallelizable: false
          randomExecutionOrder: false
